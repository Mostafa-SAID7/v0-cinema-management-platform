<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CinemaVerse - Discover, Explore & Book Premium Cinema Experiences</title>
  <base href="/">

  <!-- Viewport & Mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0F0F0F" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="color-scheme" content="dark light">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CinemaVerse">

  <!-- Primary SEO -->
  <meta name="description" content="Discover trending movies, explore upcoming releases, and book premium cinema experiences with CinemaVerse. Browse showtimes, pick seats, and manage your tickets all in one place.">
  <meta name="keywords" content="cinema, movies, showtimes, movie tickets, book cinema, trending movies, upcoming movies, movie reviews, cinema booking">
  <meta name="author" content="CinemaVerse">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="CinemaVerse">
  <meta property="og:title" content="CinemaVerse - Discover, Explore & Book Premium Cinema Experiences">
  <meta property="og:description" content="Browse trending movies, explore upcoming releases, and book premium cinema experiences. Pick showtimes, select seats, and manage your tickets effortlessly.">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CinemaVerse - Discover & Book Movies">
  <meta name="twitter:description" content="Your gateway to premium cinema experiences. Discover, explore, and book the best movies and showtimes.">

  <!-- Canonical -->
  <link rel="canonical" href="/">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Preconnect to Google Fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "CinemaVerse",
    "description": "Discover trending movies, explore upcoming releases, and book premium cinema experiences.",
    "applicationCategory": "EntertainmentApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "category": "Cinema Tickets"
    }
  }
  </script>
</head>
<body class="dark">
  <app-root></app-root>
  <noscript>
    <p>Please enable JavaScript to use CinemaVerse.</p>
  </noscript>
</body>
</html>
